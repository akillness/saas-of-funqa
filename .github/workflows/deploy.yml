name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Firebase App Hosting
    runs-on: ubuntu-latest
    needs: []

    env:
      PORT: 4300
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY }}
      SECRET_ENCRYPTION_KEY_VERSION: v1
      EMBEDDING_MODEL_ID: gemini-embedding-001
      SEARCH_TOP_K: 5
      RAG_STORE_PATH: ./.runtime/rag-store.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build:web

      - name: Deploy to Firebase App Hosting
        run: npx firebase-tools@latest deploy --only apphosting:funqa-web --project saas-of-funqa --token "${{ secrets.FIREBASE_TOKEN }}"
