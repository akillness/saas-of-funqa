name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Firebase App Hosting
    runs-on: ubuntu-latest
    needs: []

    env:
      BACKEND_ID: saas-of-funqa
      PROJECT_ID: saas-of-funqa
      APP_HOSTING_URL: https://saas-of-funqa--saas-of-funqa.us-east4.hosted.app
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      PORT: 4300
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY }}
      SECRET_ENCRYPTION_KEY_VERSION: v1
      EMBEDDING_MODEL_ID: gemini-embedding-2-preview
      EMBEDDING_OUTPUT_DIMENSION: 1536
      RAG_LIVE_EMBEDDINGS: 1
      SEARCH_TOP_K: 5
      RAG_STORE_PATH: ./.runtime/rag-store.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build:web

      - name: Deploy to Firebase App Hosting
        run: |
          set +e
          timeout 300 ./deploy.sh --apphosting
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            exit "$status"
          fi
          if [ "$status" -eq 124 ]; then
            echo "firebase deploy timed out while waiting for rollout completion; continuing to hosted verification"
          fi

      - name: Verify hosted app responds
        run: |
          for attempt in {1..18}; do
            status="$(curl -sS -o /tmp/funqa-home.html -w '%{http_code}' "$APP_HOSTING_URL/search?lang=ko" || true)"
            if [ "$status" = "200" ] && grep -q 'locale-switcher' /tmp/funqa-home.html && grep -q '필터 적용' /tmp/funqa-home.html; then
              echo "Hosted app responded with HTTP 200 and served the refreshed bilingual search UI"
              exit 0
            fi
            echo "Attempt $attempt: status=$status"
            sleep 10
          done
          echo "Hosted app did not serve the refreshed search UI in time"
          exit 1
